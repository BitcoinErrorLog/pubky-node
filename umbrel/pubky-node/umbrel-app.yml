manifestVersion: 1
id: pubky-node
category: networking
name: Pubky Node
version: "0.3.0"
tagline: Control your identity on the sovereign web
description: >-
  Take control of your identity, resolution, and reachability on the Pubky
  network. Pubky Node joins the Mainline DHT — the largest P2P network on
  Earth — and gives you encrypted key storage, PKARR DNS publishing,
  sovereign domain resolution, and Cloudflare tunnel support.


  No hosting required. Self-hosting capabilities coming soon.


  Features include a web dashboard with Networks (real-time DHT monitoring,
  UPnP status, Cloudflare tunnels), Keys (Ed25519 key vault with QR
  import/export, identity watchlist, vanity key grinder), Explorer (look up
  any public key's DNS records from the DHT), and a guided first-run
  onboarding wizard.
