manifestVersion: 1
id: pubky-node
category: networking
name: Pubky Node
version: "0.3.1"
tagline: Control your identity on the sovereign web
description: >-
  Run your own sovereign node on the Pubky network. Pubky Node joins the
  Mainline DHT — the largest P2P network on Earth — and bundles a full
  homeserver, encrypted key vault, PKARR DNS publishing, sovereign domain
  resolution, backup/recovery, and Cloudflare tunnel support.


  Features: Homeserver with embedded PostgreSQL, DNS-over-HTTPS (DoH) via
  PKDNS, identity signup, profile management, data backup with snapshots
  and migration, three independent Cloudflare tunnels (homeserver, relay,
  DNS), network explorer, PKARR publisher, vanity key generator, and a
  guided first-run onboarding wizard.
